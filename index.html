<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Details</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

/* HEADER */
.header {
    background: #0b3c49;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* TITLE */
.title {
    font-size: 20px;
    margin-bottom: 15px;
}

/* CERT FRAME */
.cert-frame {
    border: 5px solid #1e5aa5;
    border-radius: 10px;
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 450px;
    border: none;
}

/* DETAILS */
.details {
    margin-top: 20px;
}

.details p {
    margin: 8px 0;
    font-size: 15px;
}

/* VERIFIED BADGE */
.badge {
    display: inline-block;
    margin-top: 10px;
    background: #28a745;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="header">
    Certificate Verification
</div>

<div class="container">

<div class="card">

    <div class="title">
        This is to certify that <strong>Lakshmi Kiran</strong> has successfully completed the course
        <strong>Data Analytics MasterClass</strong>
    </div>

    <!-- CERTIFICATE -->
    <div class="cert-frame">
        <iframe src="https://drive.google.com/file/d/1YrQ-r6Tn84b5AqzxfMehlXxFYJBsdK22/preview"></iframe>
    </div>

    <!-- DETAILS -->
    <div class="details">
        <p><strong>Name:</strong> Lakshmi Kiran</p>
        <p><strong>Course:</strong> Data Analytics MasterClass</p>
        <p><strong>Issued By:</strong> NoviTech R&D Pvt Ltd</p>
        <p><strong>Certificate ID:</strong> NT_8330AEE243</p>
        <p><strong>Date Issued:</strong> March 2026</p>

        <div class="badge">✔ Verified Certificate</div>
    </div>

</div>

</div>

</body>
</html>
