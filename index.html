<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

.header {
    background: #0b3c49;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 30px auto;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {
    padding: 10px;
    width: 250px;
}

button {
    padding: 10px;
    background: #1e5aa5;
    color: white;
    border: none;
}

iframe {
    width: 100%;
    height: 400px;
    margin-top: 20px;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="header">Certificate Verification Portal</div>

<div class="container">
<div class="box">

<h3>Verify Certificate</h3>

<input type="text" id="certId" placeholder="Enter Certificate ID">
<button onclick="verifyCert()">Verify</button>

<p id="error" class="error"></p>

<div id="result"></div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function verifyCert() {
    const id = document.getElementById("certId").value;
    const resultDiv = document.getElementById("result");
    const error = document.getElementById("error");

    resultDiv.innerHTML = "";
    error.innerText = "";

    try {
        const doc = await db.collection("certificates").doc(id).get();

        if (doc.exists) {
            const data = doc.data();

            resultDiv.innerHTML = `
                <h4>Verified Certificate</h4>
                <p><strong>Name:</strong> ${data.name}</p>
                <p><strong>Course:</strong> ${data.course}</p>
                <p><strong>Issuer:</strong> ${data.issuer}</p>
                <p><strong>Status:</strong> ${data.status}</p>
                <iframe src="${data.certificateUrl}"></iframe>
            `;
        } else {
            error.innerText = "Invalid Certificate ID";
        }

    } catch (e) {
        error.innerText = "Error verifying certificate";
    }
}
</script>

</body>
</html>
