<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f7;
}

/* HEADER */
.header {
    background: #fff;
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.logo-img {
    height: 60px;
}

/* MAIN */
.container {
    max-width: 1000px;
    margin: 30px auto;
    padding: 15px;
}

/* CARD */
.card {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    position: relative;
}

/* VERIFIED BADGE */
.verified {
    position: absolute;
    top: 20px;
    right: 20px;
    color: green;
    font-weight: bold;
}

/* WATERMARK */
.card::before {
    content: "NOVITECH";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-size: 90px;
    color: rgba(0,0,0,0.08);
    font-weight: bold;
}

/* TITLE */
.title {
    font-size: 20px;
    margin-bottom: 15px;
}

/* CERTIFICATE */
.cert-frame {
    border: 4px solid #1e5aa5;
    border-radius: 10px;
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 450px;
    border: none;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px 15px;
    background: #1e5aa5;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #15407a;
}

/* DETAILS */
.details {
    margin-top: 20px;
}

.details p {
    margin: 6px 0;
}

/* QR */
.qr {
    margin-top: 20px;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 30px;
    color: #777;
}

/* MOBILE */
@media(max-width: 768px) {
    iframe {
        height: 300px;
    }
    .card {
        padding: 15px;
    }
    .title {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.jpg" alt="Logo" class="logo-img">
</div>

<!-- MAIN -->
<div class="container">

    <div class="card">

        <div class="verified">✔ Verified</div>

        <!-- TITLE -->
        <div class="title">
            This is to certify that <strong>Lakshmi Kiran</strong> has successfully completed the 
            <strong>Data Analytics MasterClass</strong>.
        </div>

        <!-- CERTIFICATE -->
        <div class="cert-frame">
            <iframe src="https://drive.google.com/file/d/1YrQ-r6Tn84b5AqzxfMehlXxFYJBsdK22/preview"></iframe>
        </div>

        <!-- DOWNLOAD -->
        <a href="https://drive.google.com/uc?export=download&id=1YrQ-r6Tn84b5AqzxfMehlXxFYJBsdK22" download>
            <button>Download Certificate</button>
        </a>

        <!-- DETAILS -->
        <div class="details">
            <p><strong>Name:</strong> Lakshmi Kiran</p>
            <p><strong>Course:</strong> Data Analytics MasterClass</p>
            <p><strong>Certificate ID:</strong> 
                <span style="color:#1e5aa5; font-weight:bold;">NT_8330AEE243</span>
            </p>

            <button onclick="copyID()">Copy Certificate ID</button>

            <p><strong>Issued By:</strong> NoviTech R&D Pvt Ltd</p>
            <p><strong>Date:</strong> March 2026</p>
        </div>

        <!-- QR -->
        <div class="qr">
            <p><strong>Scan to Verify:</strong></p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://your-github-page-link">
        </div>

    </div>

    <div class="footer">
        © 2026 NoviTech R&D Pvt Ltd
    </div>

</div>

<script>
function copyID() {
    navigator.clipboard.writeText("NT_8330AEE243");
    alert("Certificate ID copied!");
}

/* BASIC VERIFICATION SECURITY */
const validID = "NT_8330AEE243";
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

if(id && id !== validID){
    document.body.innerHTML = "<h2 style='text-align:center;color:red;'>Invalid Certificate</h2>";
}
</script>

</body>
</html>
